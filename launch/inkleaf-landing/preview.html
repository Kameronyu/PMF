<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>InkLeaf — Device Preview</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:ui-sans-serif,system-ui,sans-serif;
  background:#1a1714;
  color:#fff;
  min-height:100vh;
  padding:32px 16px;
  display:flex;flex-direction:column;align-items:center;gap:24px;
}
h1{font-size:18px;font-weight:500;letter-spacing:.02em;color:#a8a097;margin-bottom:8px}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.controls button{
  font:inherit;font-size:13px;
  background:#2a2622;color:#fff;
  border:1px solid #3a3530;
  padding:8px 14px;border-radius:8px;cursor:pointer;
  transition:all .15s ease;
}
.controls button:hover{background:#3a3530;border-color:#c76a2d}
.controls button.active{background:#c76a2d;border-color:#c76a2d}
.stage{
  display:flex;flex-wrap:wrap;gap:32px;justify-content:center;align-items:flex-start;
  width:100%;
}
.phone{
  background:#0a0805;
  border-radius:42px;
  padding:14px;
  box-shadow:0 10px 40px rgba(0,0,0,.5), inset 0 0 0 2px #2a2622;
  position:relative;
  transition:width .2s ease, height .2s ease;
}
.phone::before{
  content:"";position:absolute;top:18px;left:50%;transform:translateX(-50%);
  width:90px;height:24px;background:#0a0805;border-radius:14px;z-index:2;
}
.phone-screen{
  border-radius:30px;overflow:hidden;background:#000;
  width:100%;height:100%;
}
.phone iframe{
  width:100%;height:100%;border:0;display:block;
  background:#F4EFE6;
}
.size-label{
  text-align:center;color:#a8a097;font-size:12px;margin-top:12px;
  font-family:ui-monospace,monospace;letter-spacing:.04em;
}
.desktop{
  background:#0a0805;border-radius:14px;padding:8px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}
.desktop-screen{
  border-radius:6px;overflow:hidden;background:#000;
  width:480px;height:320px;
}
.desktop iframe{width:100%;height:100%;border:0;display:block}
@media(max-width:900px){
  .desktop-screen{width:90vw;height:60vw;max-width:480px;max-height:320px}
}
</style>
</head>
<body>

<h1>InkLeaf Landing — Mobile Preview</h1>

<div class="controls">
  <button data-w="375" data-h="667" class="active">iPhone SE (375×667)</button>
  <button data-w="390" data-h="844">iPhone 14 (390×844)</button>
  <button data-w="430" data-h="932">iPhone 15 Pro Max (430×932)</button>
  <button data-w="360" data-h="800">Pixel / Android (360×800)</button>
</div>

<div class="stage">
  <div>
    <div class="phone" id="phone">
      <div class="phone-screen">
        <iframe src="index.html" title="InkLeaf mobile preview"></iframe>
      </div>
    </div>
    <div class="size-label" id="sizeLabel">375 × 667 px</div>
  </div>

  <div>
    <div class="desktop">
      <div class="desktop-screen">
        <iframe src="index.html" title="InkLeaf desktop preview"></iframe>
      </div>
    </div>
    <div class="size-label">Desktop reference</div>
  </div>
</div>

<script>
  const phone = document.getElementById('phone');
  const sizeLabel = document.getElementById('sizeLabel');
  const buttons = document.querySelectorAll('.controls button');

  function setSize(w, h){
    phone.style.width = (w + 28) + 'px';
    phone.style.height = (h + 28) + 'px';
    const screen = phone.querySelector('.phone-screen');
    screen.style.width = w + 'px';
    screen.style.height = h + 'px';
    sizeLabel.textContent = `${w} × ${h} px`;
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setSize(parseInt(btn.dataset.w), parseInt(btn.dataset.h));
    });
  });

  // initial
  setSize(375, 667);
</script>

</body>
</html>
