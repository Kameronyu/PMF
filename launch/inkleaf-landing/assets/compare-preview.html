<!doctype html>
<html><head><meta charset="utf-8"><title>InkLeaf vs Notebook</title>
<style>
  html,body{margin:0;background:#0a0a0a;color:#f5efe3;font-family:Georgia,serif;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
  .row{display:flex;gap:24px;align-items:flex-start}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  video{height:70vh;background:#000;border-radius:4px}
  .label{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#cfc7b6;font-family:Consolas,monospace}
  button{background:#f5efe3;color:#0a0a0a;border:0;padding:12px 28px;font-family:Georgia,serif;font-size:16px;border-radius:999px;cursor:pointer}
  button:hover{background:#fff}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="label">Notebook</div><video id="a" src="compare-notebook.mp4" muted playsinline></video></div>
    <div class="col"><div class="label">InkLeaf</div><video id="b" src="compare-tablet.mp4" muted playsinline></video></div>
  </div>
  <button onclick="play()">Play both</button>
  <script>
    const a=document.getElementById('a'),b=document.getElementById('b');
    async function play(){
      a.currentTime=0; b.currentTime=0;
      await Promise.all([a.play(),b.play()]);
    }
    // auto-play on load too
    window.addEventListener('load',()=>setTimeout(play,300));
  </script>
</body></html>
