<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0b0d10"/>
  <!-- translucent see-through console body, light blue -->
  <rect x="16" y="7" width="32" height="50" rx="8" fill="#bdf4ff" fill-opacity="0.92" stroke="#ffffff" stroke-width="1.5"/>
  <!-- screen -->
  <rect x="21" y="12" width="22" height="18" rx="2" fill="#0b0d10"/>
  <!-- screen glow pixel (cyan) -->
  <rect x="24" y="15" width="8" height="7" rx="1" fill="#2be5ff"/>
  <rect x="34" y="20" width="5" height="5" rx="1" fill="#2be5ff" fill-opacity="0.7"/>
  <!-- d-pad -->
  <rect x="20" y="40.5" width="11" height="3.6" rx="1.2" fill="#0b0d10"/>
  <rect x="23.7" y="36.8" width="3.6" height="11" rx="1.2" fill="#0b0d10"/>
  <!-- A/B buttons -->
  <circle cx="40" cy="41" r="2.4" fill="#0b0d10"/>
  <circle cx="44.5" cy="45.5" r="2.4" fill="#0b0d10"/>
</svg>
